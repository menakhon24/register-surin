<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ลงทะเบียนโครงการพัฒนาศักยภาพผู้บริหาร</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background-color: #f0f4f8; font-family: 'Sarabun', sans-serif; color: #333; }
    .container { max-width: 850px; margin-top: 40px; }
    .card { border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: none; }
    .header-bg { background: linear-gradient(135deg, #1A2980 0%, #26D0CE 100%); color: white; padding: 30px 20px; border-radius: 15px 15px 0 0; }
    .header-bg h3 { font-weight: 700; text-shadow: 1px 1px 3px rgba(0,0,0,0.2); }
    .btn-primary { background: linear-gradient(135deg, #1A2980 0%, #26D0CE 100%); border: none; font-weight: 600; border-radius: 8px; }
    .form-control, .form-select { border-radius: 8px; border: 1px solid #ced4da; }
    .nav-tabs .nav-link { color: #6c757d; font-weight: 500; border: none; border-radius: 10px 10px 0 0; }
    .nav-tabs .nav-link.active { color: #1A2980; font-weight: 700; border-bottom: 3px solid #1A2980; }
  </style>
</head>
<body>
  <div class="container mb-5">
    <div class="header-bg text-center shadow-sm">
      <h3 class="mb-2">ลงทะเบียนโครงการพัฒนาศักยภาพผู้บริหาร</h3>
      <p class="mb-0">สังกัด สพป.สุรินทร์ เขต 3 (12-14 กรกฎาคม 2569 ณ จ.เพชรบูรณ์)</p>
    </div>
    
    <div class="card">
      <div class="card-body p-4 p-md-5">
        <ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
          <li class="nav-item" role="presentation"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#register">📝 ฟอร์มลงทะเบียน</button></li>
          <li class="nav-item" role="presentation"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#check">🔍 ตรวจสอบสถานะ</button></li>
        </ul>

        <div class="tab-content" id="myTabContent">
          <div class="tab-pane fade show active" id="register">
            <form id="regForm" onsubmit="handleFormSubmit(event)">
              <div class="row g-4">
                <div class="col-md-3">
                  <label class="form-label">1. คำนำหน้า</label>
                  <select class="form-select" id="prefixSelect" onchange="togglePrefixInput()" required>
                    <option value="">เลือก...</option>
                    <option value="นาย">นาย</option>
                    <option value="นาง">นาง</option>
                    <option value="นางสาว">นางสาว</option>
                    <option value="อื่นๆ">อื่นๆ (โปรดระบุ)</option>
                  </select>
                  <input type="text" class="form-control mt-2" id="prefixOther" placeholder="ระบุคำนำหน้า..." style="display: none;">
                </div>
                <div class="col-md-9">
                  <label class="form-label">2. ชื่อ-สกุล</label>
                  <input type="text" class="form-control" id="fullName" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">3. เลขที่บัตร ปปช. (13 หลัก)</label>
                  <input type="text" class="form-control" id="citizenId" pattern="\d{13}" maxlength="13" oninput="this.value = this.value.replace(/[^0-9.]/g, '');" placeholder="เลข 13 หลัก" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">4. ตำแหน่ง</label>
                  <select class="form-select" id="positionSelect" onchange="togglePositionInput()" required>
                    <option value="">เลือก...</option>
                    <option value="ผู้อำนวยการโรงเรียน">ผู้อำนวยการโรงเรียน</option>
                    <option value="รองผู้อำนวยการโรงเรียน">รองผู้อำนวยการโรงเรียน</option>
                    <option value="อื่นๆ">อื่นๆ (โปรดระบุ)</option>
                  </select>
                  <input type="text" class="form-control mt-2" id="positionOther" placeholder="ระบุตำแหน่งของคุณ..." style="display: none;">
                </div>
                <div class="col-md-6">
                  <label class="form-label">5. เบอร์มือถือ</label>
                  <input type="text" class="form-control" id="phone" pattern="\d{9,10}" maxlength="10" oninput="this.value = this.value.replace(/[^0-9.]/g, '');" placeholder="08XXXXXXXX" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">6. สังกัด (โรงเรียน หรือ สพท.)</label>
                  <input type="text" class="form-control" id="organization" placeholder="โรงเรียนสุวรรณคารสงเคราะห์" required>
                </div>
                <div class="col-md-12">
                  <label class="form-label">7. เครือข่ายการจัดการศึกษา</label>
                  <input type="text" class="form-control" id="network" placeholder="ปราสาท 3" required>
                </div>
                <div class="col-md-12">
                  <label class="form-label">8. ที่อยู่โรงเรียน</label>
                  <div class="row g-2">
                    <div class="col-md-4"><input type="text" class="form-control" id="houseNo" placeholder="เลขที่/หมู่" required></div>
                    <div class="col-md-4"><input type="text" class="form-control" id="subDistrict" placeholder="ตำบล" required></div>
                    <div class="col-md-4"><input type="text" class="form-control" id="district" placeholder="อำเภอ" required></div>
                  </div>
                </div>
                <div class="col-md-12">
                  <label class="form-label">9. เลขที่ผู้เสียภาษี (โรงเรียน 13 หลัก)</label>
                  <input type="text" class="form-control" id="taxId" pattern="\d{13}" maxlength="13" oninput="this.value = this.value.replace(/[^0-9.]/g, '');" placeholder="เลข 13 หลัก" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">10. ไซต์เสื้อ <a href="#" class="text-primary ms-1" data-bs-toggle="modal" data-bs-target="#sizeModal"><small>(คลิกดูขนาดเสื้อ)</small></a></label>
                  <select class="form-select" id="shirtSize" required>
                    <option value="">เลือกไซส์...</option>
                    <option value="SSS">SSS</option><option value="SS">SS</option><option value="S">S</option>
                    <option value="M">M</option><option value="L">L</option><option value="XL">XL</option>
                    <option value="2XL">2XL</option><option value="3XL">3XL</option><option value="4XL">4XL</option>
                    <option value="5XL">5XL</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label">11. คำบนเสื้อ</label>
                  <select class="form-select" id="shirtWord" required onchange="showShirtImage()">
                    <option value="">เลือกคำ...</option>
                    <option value="มิตรภาพ">มิตรภาพ</option><option value="สัมพันธภาพ">สัมพันธภาพ</option><option value="ภราดรภาพ">ภราดรภาพ</option>
                  </select>
                  <div id="dynamicShirtPreview" class="mt-3 text-center" style="display: none;">
                    <img id="selectedShirtImage" src="" alt="ตัวอย่างเสื้อ" class="img-fluid rounded shadow border" style="max-height: 250px;">
                    <p class="text-primary small mt-2 fw-bold" id="shirtImageCaption"></p>
                  </div>
                </div>
              </div>
              <hr class="my-5 opacity-25">
              <button type="submit" class="btn btn-primary w-100 py-3 fs-5" id="btnSubmit">บันทึกข้อมูลการลงทะเบียน</button>
              <div id="regAlert" class="mt-4 text-center"></div>
            </form>
          </div>

          <div class="tab-pane fade" id="check">
            <div class="row justify-content-center mt-4 mb-5">
              <div class="col-md-8 text-center">
                <h5 class="mb-4 fw-bold text-secondary">ตรวจสอบสถานะการลงทะเบียน</h5>
                <div class="input-group input-group-lg mb-3 shadow-sm rounded">
                  <input type="text" class="form-control bg-light border-0" id="searchId" maxlength="13" oninput="this.value = this.value.replace(/[^0-9.]/g, '');" placeholder="กรอกเลขบัตร ปปช. 13 หลัก">
                  <button class="btn btn-primary px-4" type="button" onclick="checkData()" id="btnSearch">ค้นหา</button>
                </div>
                <div id="checkResult" class="mt-4"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="mt-5 p-4 bg-light rounded-3 border-start border-4 border-primary shadow-sm">
          <h6 class="fw-bold text-primary mb-3">📞 ติดต่อสอบถามข้อมูลเพิ่มเติม</h6>
          <div class="row">
            <div class="col-md-6 mb-2">
              <p class="mb-1 fw-bold">นางสาวปราณน์วรินทร์ พัชรวราวงศ์ (ผอ.มาตา)</p>
              <p class="mb-0 text-muted">มือถือ: <a href="tel:0896124953" class="text-decoration-none fw-bold text-primary">089-612-4953</a></p>
            </div>
            <div class="col-md-6">
              <p class="mb-1 fw-bold">นางสุวรรณ์นี ปรุงเกียรติ (ผอ.ณี)</p>
              <p class="mb-0 text-muted">มือถือ: <a href="tel:0884732654" class="text-decoration-none fw-bold text-primary">088-473-2654</a></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="sizeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-body text-center p-4">
      <img src="https://i.ibb.co/67Dmrp0B/Gemini-Generated-Image-mwgcdomwgcdomwgc.png" class="img-fluid rounded">
    </div></div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // ⚠️ นำ URL ของ Apps Script ที่ได้จากข้อ 1. มาวางในเครื่องหมายคำพูดด้านล่างนี้เลยครับ
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwtsQn2lbq2PxwuUs2QBLc9mcJXuFhc-wYSfbINyQGm54dUDBNbs6_i7JOlvXMEHe0c/exec";

    function togglePrefixInput() {
      var s = document.getElementById("prefixSelect"), o = document.getElementById("prefixOther");
      s.value === "อื่นๆ" ? (o.style.display="block", o.required=true) : (o.style.display="none", o.required=false);
    }
    function togglePositionInput() {
      var s = document.getElementById("positionSelect"), o = document.getElementById("positionOther");
      s.value === "อื่นๆ" ? (o.style.display="block", o.required=true) : (o.style.display="none", o.required=false);
    }
    function showShirtImage() {
      var word = document.getElementById("shirtWord").value, div = document.getElementById("dynamicShirtPreview"), img = document.getElementById("selectedShirtImage"), cap = document.getElementById("shirtImageCaption");
      var urls = { "มิตรภาพ": "https://i.ibb.co/237K5Y3t/1.png", "สัมพันธภาพ": "https://i.ibb.co/nMdnrD9y/2.png", "ภราดรภาพ": "https://i.ibb.co/v4XtDFzf/3.png" };
      word && urls[word] ? (img.src = urls[word], cap.innerText = "เสื้อคำว่า: "+word, div.style.display="block") : div.style.display="none";
    }

    function handleFormSubmit(event) {
      event.preventDefault();
      var btn = document.getElementById('btnSubmit'), alertBox = document.getElementById('regAlert');
      btn.disabled = true; btn.innerHTML = 'กำลังบันทึกข้อมูล...';

      var dataObj = {
        prefix: document.getElementById('prefixSelect').value === "อื่นๆ" ? document.getElementById('prefixOther').value : document.getElementById('prefixSelect').value,
        fullName: document.getElementById('fullName').value,
        citizenId: document.getElementById('citizenId').value,
        position: document.getElementById('positionSelect').value === "อื่นๆ" ? document.getElementById('positionOther').value : document.getElementById('positionSelect').value,
        phone: document.getElementById('phone').value,
        organization: document.getElementById('organization').value,
        network: document.getElementById('network').value,
        fullAddress: document.getElementById('houseNo').value + ' ต.' + document.getElementById('subDistrict').value + ' อ.' + document.getElementById('district').value,
        taxId: document.getElementById('taxId').value,
        shirtSize: document.getElementById('shirtSize').value,
        shirtWord: document.getElementById('shirtWord').value
      };

      // ใช้ fetch API สื่อสารกับ Google Apps Script
      fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(dataObj)
      })
      .then(res => res.json())
      .then(response => {
        btn.disabled = false; btn.innerHTML = 'บันทึกข้อมูลการลงทะเบียน';
        if(response.success) {
          alertBox.innerHTML = '<div class="alert alert-success fs-5 fw-bold shadow-sm">✅ บันทึกข้อมูลเรียบร้อยแล้ว</div>';
          document.getElementById('regForm').reset();
          togglePrefixInput(); togglePositionInput(); document.getElementById("dynamicShirtPreview").style.display = "none";
        } else {
          alertBox.innerHTML = '<div class="alert alert-danger shadow-sm">❌ ' + response.message + '</div>';
        }
      })
      .catch(error => { btn.disabled = false; btn.innerHTML = 'บันทึกข้อมูลการลงทะเบียน'; alertBox.innerHTML = '<div class="alert alert-danger shadow-sm">เกิดข้อผิดพลาดในการส่งข้อมูล</div>'; });
    }

    function checkData() {
      var cid = document.getElementById('searchId').value, btn = document.getElementById('btnSearch'), resultBox = document.getElementById('checkResult');
      if(cid.length !== 13) return resultBox.innerHTML = '<div class="alert alert-warning">กรุณากรอกเลขบัตร 13 หลัก</div>';
      
      btn.disabled = true; btn.innerHTML = 'กำลังค้นหา...';
      
      fetch(SCRIPT_URL + "?action=check&citizenId=" + cid)
      .then(res => res.json())
      .then(response => {
        btn.disabled = false; btn.innerHTML = 'ค้นหา';
        if(response.found) {
          resultBox.innerHTML = '<div class="alert alert-success text-start shadow-sm p-4"><h5 class="fw-bold mb-3 text-success">✅ พบข้อมูลการลงทะเบียน</h5><p class="mb-1"><strong>ชื่อ:</strong> '+response.name+'</p><p class="mb-1"><strong>ตำแหน่ง:</strong> '+response.position+'</p><p class="mb-2"><strong>สังกัด:</strong> '+response.organization+'</p><p class="mb-0 text-primary fw-bold">👕 '+response.shirtInfo+'</p></div>';
        } else {
          resultBox.innerHTML = '<div class="alert alert-danger shadow-sm">❌ ' + response.message + '</div>';
        }
      })
      .catch(error => { btn.disabled = false; btn.innerHTML = 'ค้นหา'; resultBox.innerHTML = '<div class="alert alert-danger">เกิดข้อผิดพลาดในการเชื่อมต่อ</div>'; });
    }
  </script>
</body>
</html>
